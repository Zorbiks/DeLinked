<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="popup.css" />
        <title>DeLinked</title>
    </head>
    <body>
        <div class="popup-container">
            <h2 class="popup-title">DeLinked Controls</h2>
            <hr class="divider" />

            <div class="control-row">
                <span class="control-label">Hide Timeline</span>
                <label class="switch">
                    <input type="checkbox" id="timeline-toggle-checkbox" />
                    <span class="slider round"></span>
                </label>
            </div>

            <hr class="divider" />

            <div class="api-container">
                <label for="api-key-input" class="control-label">Gemini API Key</label>
                <div class="input-row">
                    <input type="password" id="api-key-input" placeholder="Enter API Key..." />
                    <button id="save-key-btn">Save</button>
                </div>
                <span id="save-status"></span>
            </div>
        </div>

        <script src="popup.js"></script>
    </body>
</html>
